<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Haruspex–JADE Laboratórium</title>
    <script>
      // GitHub Pages SPA redirect - preserves the route path using sessionStorage
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
